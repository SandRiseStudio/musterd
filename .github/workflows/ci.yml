# CI — the authoritative merge gate (ADR 106). Runs the same gates agents run locally, on every PR.
# Local runs are an optional fast smoke-test; THIS is the source of truth that branch protection
# requires green before a squash-merge. Keep the job name `gates` stable — it's the required check.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per ref; a new push cancels the stale one (saves minutes on rapid agent pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Full history so roadmap-truth:check can verify shipped items against merged-PR commits
        # (`git log --grep "(#N)"`); the default shallow depth-1 checkout would hide them.
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # dist/ is gitignored and workspace packages resolve to ./dist, so build before typecheck/test.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # Byte budgets for the built web client (ADR 151) — guards the /live perf arc (#326–#331)
      # against silent regression. Needs Build first (reads packages/web/dist/client).
      - name: Perf budgets
        run: pnpm perf:check

      # Lint is a gate, not a suggestion: without it, import/order and dead eslint-disables drift into
      # main between the rare manual `pnpm lint` (8 had accumulated by #248). Runs after Build because
      # the import resolver follows workspace packages to their ./dist, which does not exist pre-build.
      - name: Lint
        run: pnpm lint

      # `pnpm coverage` runs the full suite AND enforces the per-package line floors (vitest.config.ts),
      # so a drop below the floor fails the gate — closes the silent coverage-drift gap (ADR 106).
      - name: Tests + coverage
        run: pnpm coverage

      # prettier + roadmap:check + arch-trees:check + obs-evals:check + guidance:check + vocab:check
      - name: Gates (format + docs)
        run: pnpm format:check
